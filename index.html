<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a1628" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f5a800" media="(prefers-color-scheme: light)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ETA" />
  <meta name="description" content="VFR ETA-beregner til flyveledelse" />
  <title>ETA · VFR</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a1628;
      --surface: #111f38;
      --card:    #162745;
      --border:  rgba(255,255,255,0.08);
      --accent:  #4a9eff;
      --accent2: #1a6fcc;
      --text:    #e8f0fb;
      --muted:   #7a95bc;
      --dim:     #3d5a80;
      --eta-col: #e8f0fb;
      --amber:   #f5a623;
      --red:     #e84040;
      --green:   #22c97a;
      --radius:  14px;
      --mono:    'SF Mono', 'Fira Mono', 'Consolas', monospace;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg:      #f5a800;
        --surface: #e09600;
        --card:    #ffc740;
        --border:  rgba(0,0,0,0.18);
        --accent:  #1a1a00;
        --accent2: #000000;
        --text:    #0d0d00;
        --muted:   #3a2e00;
        --dim:     #7a6200;
        --eta-col: #000000;
        --amber:   #5a3d00;
        --red:     #8b0000;
        --green:   #004d20;
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    nav {
      display: flex;
      border-bottom: 0.5px solid var(--border);
      flex-shrink: 0;
    }

    .nav-tab {
      flex: 1;
      padding: 14px 8px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-tab.active { color: var(--text); border-bottom-color: var(--accent); }
    @media (prefers-color-scheme: light) { .nav-tab.active { border-bottom-color: #1a1a00; } }

    .page { display: none; flex: 1; flex-direction: column; justify-content: center; padding: 16px 16px; gap: 12px; overflow-y: auto; }
    .page.active { display: flex; }

    /* ── ETA ── */
    .field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding-left: 2px; }
    .time-input {
      width: 100%; background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-family: var(--mono);
      font-size: 32px; font-weight: 600; text-align: center; letter-spacing: 4px;
      padding: 16px 12px; appearance: none; -webkit-appearance: none; caret-color: var(--accent);
    }
    .time-input::placeholder { color: var(--dim); letter-spacing: 3px; }
    .time-input:focus { outline: none; border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(0,0,0,0.12); }
    .time-input.error { border-color: var(--red); }
    .field-hint  { font-size: 11px; color: var(--dim); text-align: center; }
    .field-error { font-size: 11px; color: var(--red); text-align: center; min-height: 14px; font-weight: 600; }

    .result-card {
      background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 14px 20px; display: flex; flex-direction: column; align-items: center; gap: 4px;
      position: relative; overflow: hidden;
    }
    .result-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--eta-col); opacity: 0; transition: opacity 0.3s; }
    .result-card.has-result::before { opacity: 0.4; }
    .result-label { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
    .result-time { font-family: var(--mono); font-size: 60px; font-weight: 700; color: var(--eta-col); letter-spacing: 6px; line-height: 1; }
    .result-time.empty { color: var(--dim); font-weight: 400; font-size: 52px; letter-spacing: 4px; }
    .result-meta { font-size: 12px; color: var(--muted); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; font-weight: 500; }
    .midnight-badge { background: rgba(0,0,0,0.12); color: var(--amber); border: 1px solid rgba(0,0,0,0.2); border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
    @media (prefers-color-scheme: dark) { .midnight-badge { background: rgba(245,166,35,0.15); color: #f5a623; border-color: rgba(245,166,35,0.3); } }
    .reset-btn { margin-top: 2px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; color: var(--muted); font-size: 14px; font-weight: 600; padding: 8px 32px; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
    .reset-btn:active { background: var(--card); color: var(--text); transform: scale(0.97); }

    .numpad-section { display: flex; flex-direction: column; gap: 8px; }
    .active-field-indicator { display: flex; gap: 8px; justify-content: center; }
    .field-tab { flex: 1; max-width: 140px; padding: 7px 12px; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; text-align: center; }
    .field-tab.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }
    @media (prefers-color-scheme: light) { .field-tab.active { background: #1a1a00; border-color: #1a1a00; } }

    .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .num-btn { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 24px; font-weight: 500; padding: 14px 10px; cursor: pointer; transition: background 0.1s, transform 0.08s; -webkit-tap-highlight-color: transparent; user-select: none; }
    .num-btn:active { background: var(--surface); transform: scale(0.96); }
    .num-btn.del-btn { font-size: 18px; color: var(--muted); }
    .num-btn.zero-btn { grid-column: 2; }

    /* ── Wake turbulence ── */
    .wt-section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted); padding-left: 2px;
    }

    .wt-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .wt-card {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px;
      display: flex; flex-direction: column; gap: 6px;
      position: relative; overflow: hidden; transition: border-color 0.3s;
    }
    .wt-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--dim); transition: background 0.3s; }
    .wt-card.running::before { background: var(--amber); }
    .wt-card.done::before    { background: var(--green); }
    .wt-card.running { border-color: rgba(245,166,35,0.3); }
    .wt-card.done    { border-color: rgba(34,201,122,0.3); }
    @media (prefers-color-scheme: light) {
      .wt-card.running { border-color: rgba(90,61,0,0.35); }
      .wt-card.done    { border-color: rgba(0,77,32,0.35); }
    }

    .wt-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

    .wt-countdown {
      font-family: var(--mono); font-size: 38px; font-weight: 700;
      color: var(--text); letter-spacing: 2px; line-height: 1; transition: color 0.3s;
    }
    .wt-card.running .wt-countdown { color: var(--amber); }
    .wt-card.done    .wt-countdown { color: var(--green); }

    .wt-status { font-size: 11px; font-weight: 600; color: var(--dim); min-height: 15px; }
    .wt-card.running .wt-status { color: var(--amber); }
    .wt-card.done    .wt-status  { color: var(--green); }

    .wt-progress-wrap { width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .wt-progress-bar  { height: 100%; background: var(--amber); border-radius: 2px; transition: width 0.9s linear; width: 0%; }
    .wt-card.done .wt-progress-bar { background: var(--green); width: 0%; transition: none; }

    .wt-btn {
      width: 100%; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--muted); font-size: 13px; font-weight: 700;
      padding: 10px 8px; cursor: pointer; transition: all 0.15s;
      -webkit-tap-highlight-color: transparent; letter-spacing: 0.04em;
    }
    .wt-btn:active { transform: scale(0.97); }
    .wt-btn.start  { background: var(--accent2); border-color: var(--accent2); color: #fff; }
    .wt-btn.stop   { background: var(--surface); color: var(--muted); }
    @media (prefers-color-scheme: light) { .wt-btn.start { background: #1a1a00; border-color: #1a1a00; color: #fff; } }

    .wt-reset-all { background: transparent; border: 1.5px solid var(--border); border-radius: 10px; color: var(--dim); font-size: 13px; font-weight: 600; padding: 10px; cursor: pointer; transition: all 0.15s; width: 100%; -webkit-tap-highlight-color: transparent; }
    .wt-reset-all:active { color: var(--muted); background: var(--card); }

    @media (max-height: 750px) {
      .num-btn { padding: 11px 10px; font-size: 22px; }
      .page { gap: 10px; padding: 12px 16px; }
      .result-time { font-size: 48px; }
      .wt-countdown { font-size: 32px; }
    }
  </style>
</head>
<body>

<nav>
  <button class="nav-tab active" onclick="showPage('eta', this)">ETA</button>
  <button class="nav-tab" onclick="showPage('wt', this)">Wake turbulence</button>
</nav>

<!-- ── ETA PAGE ── -->
<div class="page active" id="page-eta">
  <div class="field-group">
    <div class="field">
      <span class="field-label">Starttid (ATD)</span>
      <input class="time-input" id="dep" type="text" inputmode="none" placeholder="––––" maxlength="4" autocomplete="off" readonly />
      <span class="field-hint">HHMM · UTC</span>
      <span class="field-error" id="dep-err"></span>
    </div>
    <div class="field">
      <span class="field-label">Flyvetid (EET)</span>
      <input class="time-input" id="dur" type="text" inputmode="none" placeholder="––––" maxlength="4" autocomplete="off" readonly />
      <span class="field-hint">HHMM</span>
      <span class="field-error" id="dur-err"></span>
    </div>
  </div>

  <div class="result-card" id="result-card">
    <span class="result-label">ETA</span>
    <span class="result-time empty" id="result-time">––––</span>
    <div class="result-meta" id="result-meta"></div>
    <button class="reset-btn" id="reset-btn">↺ Ryd</button>
  </div>

  <div class="numpad-section">
    <div class="active-field-indicator">
      <button class="field-tab active" id="tab-dep" onclick="switchField('dep')">Starttid</button>
      <button class="field-tab" id="tab-dur" onclick="switchField('dur')">Flyvetid</button>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="numPress('1')">1</button>
      <button class="num-btn" onclick="numPress('2')">2</button>
      <button class="num-btn" onclick="numPress('3')">3</button>
      <button class="num-btn" onclick="numPress('4')">4</button>
      <button class="num-btn" onclick="numPress('5')">5</button>
      <button class="num-btn" onclick="numPress('6')">6</button>
      <button class="num-btn" onclick="numPress('7')">7</button>
      <button class="num-btn" onclick="numPress('8')">8</button>
      <button class="num-btn" onclick="numPress('9')">9</button>
      <button class="num-btn zero-btn" onclick="numPress('0')">0</button>
      <button class="num-btn del-btn" onclick="numDel()">⌫</button>
    </div>
  </div>
</div>

<!-- ── WAKE TURBULENCE PAGE ── -->
<div class="page" id="page-wt">

  <span class="wt-section-label">2 minutter</span>
  <div class="wt-pair">
    <div class="wt-card" id="wt-card-2-1">
      <span class="wt-label">Timer 1</span>
      <span class="wt-countdown" id="wt-display-2-1">2:00</span>
      <span class="wt-status" id="wt-status-2-1">Klar</span>
      <div class="wt-progress-wrap"><div class="wt-progress-bar" id="wt-bar-2-1"></div></div>
      <button class="wt-btn start" id="wt-btn-2-1" onclick="wtToggle('2-1',120)">Start</button>
    </div>
    <div class="wt-card" id="wt-card-2-2">
      <span class="wt-label">Timer 2</span>
      <span class="wt-countdown" id="wt-display-2-2">2:00</span>
      <span class="wt-status" id="wt-status-2-2">Klar</span>
      <div class="wt-progress-wrap"><div class="wt-progress-bar" id="wt-bar-2-2"></div></div>
      <button class="wt-btn start" id="wt-btn-2-2" onclick="wtToggle('2-2',120)">Start</button>
    </div>
  </div>

  <span class="wt-section-label">3 minutter</span>
  <div class="wt-pair">
    <div class="wt-card" id="wt-card-3-1">
      <span class="wt-label">Timer 1</span>
      <span class="wt-countdown" id="wt-display-3-1">3:00</span>
      <span class="wt-status" id="wt-status-3-1">Klar</span>
      <div class="wt-progress-wrap"><div class="wt-progress-bar" id="wt-bar-3-1"></div></div>
      <button class="wt-btn start" id="wt-btn-3-1" onclick="wtToggle('3-1',180)">Start</button>
    </div>
    <div class="wt-card" id="wt-card-3-2">
      <span class="wt-label">Timer 2</span>
      <span class="wt-countdown" id="wt-display-3-2">3:00</span>
      <span class="wt-status" id="wt-status-3-2">Klar</span>
      <div class="wt-progress-wrap"><div class="wt-progress-bar" id="wt-bar-3-2"></div></div>
      <button class="wt-btn start" id="wt-btn-3-2" onclick="wtToggle('3-2',180)">Start</button>
    </div>
  </div>

  <button class="wt-reset-all" onclick="wtResetAll()">↺ Nulstil alle</button>
</div>

<script>
  /* ── Nav ── */
  function showPage(id, tab) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    tab.classList.add('active');
  }

  /* ── ETA ── */
  let activeField = 'dep';
  const state = { dep: '', dur: '' };
  const depEl      = document.getElementById('dep');
  const durEl      = document.getElementById('dur');
  const depErr     = document.getElementById('dep-err');
  const durErr     = document.getElementById('dur-err');
  const resultTime = document.getElementById('result-time');
  const resultMeta = document.getElementById('result-meta');
  const resultCard = document.getElementById('result-card');

  function switchField(f) {
    activeField = f;
    document.getElementById('tab-dep').classList.toggle('active', f === 'dep');
    document.getElementById('tab-dur').classList.toggle('active', f === 'dur');
  }
  depEl.addEventListener('focus', () => switchField('dep'));
  durEl.addEventListener('focus', () => switchField('dur'));

  function numPress(d) {
    if (state[activeField].length >= 4) return;
    state[activeField] += d;
    render();
    if (state[activeField].length === 4 && activeField === 'dep') setTimeout(() => switchField('dur'), 120);
  }
  function numDel() { state[activeField] = state[activeField].slice(0, -1); render(); }

  document.getElementById('reset-btn').addEventListener('click', () => { state.dep = ''; state.dur = ''; render(); switchField('dep'); });

  function formatDisplay(raw) { if (!raw) return ''; const p = raw.padStart(4,'0'); return p.slice(0,2)+':'+p.slice(2,4); }
  function parseMinutes(raw) {
    if (!raw.length) return null;
    const p = raw.padStart(4,'0');
    const hh = parseInt(p.slice(0,2),10), mm = parseInt(p.slice(2,4),10);
    if (hh > 23 || mm > 59) return null;
    return hh * 60 + mm;
  }
  function toHHMM(m) { const mod=((m%1440)+1440)%1440; return String(Math.floor(mod/60)).padStart(2,'0')+String(mod%60).padStart(2,'0'); }
  function durLabel(m) { const h=Math.floor(m/60),s=m%60; if(!h) return s+'min'; if(!s) return h+'t'; return h+'t '+s+'min'; }

  function render() {
    const d = state.dep, u = state.dur;
    depEl.value = d.length ? formatDisplay(d) : '';
    durEl.value = u.length ? formatDisplay(u) : '';
    depErr.textContent = ''; durErr.textContent = '';
    depEl.classList.remove('error'); durEl.classList.remove('error');
    const dm = d.length===4 ? parseMinutes(d) : null;
    const um = u.length===4 ? parseMinutes(u) : null;
    if (d.length===4 && dm===null) { depErr.textContent='Ugyldig tid'; depEl.classList.add('error'); }
    if (u.length===4 && um===null) { durErr.textContent='Ugyldig tid'; durEl.classList.add('error'); }
    if (dm!==null && um!==null) {
      const eta = dm+um, s = toHHMM(eta);
      resultTime.textContent = s.slice(0,2)+':'+s.slice(2,4);
      resultTime.classList.remove('empty'); resultCard.classList.add('has-result');
      resultMeta.innerHTML = durLabel(um)+' flyvetid';
      if (eta>=1440) resultMeta.innerHTML += ' <span class="midnight-badge">+1 dag</span>';
    } else {
      resultTime.textContent='––––'; resultTime.classList.add('empty');
      resultCard.classList.remove('has-result'); resultMeta.innerHTML='';
    }
  }

  /* ── Wake turbulence ── */
  const wtTimers = {};

  function wtToggle(id, total) {
    if (!wtTimers[id]) wtTimers[id] = { interval: null, remaining: total, total, running: false, done: false };
    const s    = wtTimers[id];
    const card = document.getElementById('wt-card-' + id);
    const disp = document.getElementById('wt-display-' + id);
    const stat = document.getElementById('wt-status-' + id);
    const btn  = document.getElementById('wt-btn-' + id);
    const bar  = document.getElementById('wt-bar-' + id);
    const mins = total / 60;

    if (s.running || s.done) {
      // Reset
      clearInterval(s.interval);
      Object.assign(s, { interval: null, running: false, done: false, remaining: total });
      card.className = 'wt-card';
      disp.textContent = mins + ':00';
      stat.textContent = 'Klar';
      btn.textContent = 'Start'; btn.className = 'wt-btn start';
      bar.style.transition = 'none'; bar.style.width = '0%';
      return;
    }

    // Start
    s.running = true; s.remaining = total;
    card.classList.add('running');
    btn.textContent = 'Stop'; btn.className = 'wt-btn stop';
    stat.textContent = 'Tæller ned...';
    bar.style.transition = 'none'; bar.style.width = '100%';
    setTimeout(() => { bar.style.transition = 'width 0.9s linear'; }, 50);
    if (navigator.vibrate) navigator.vibrate(50);

    s.interval = setInterval(() => {
      s.remaining--;
      const m = Math.floor(s.remaining / 60), sc = s.remaining % 60;
      disp.textContent = m + ':' + String(sc).padStart(2,'0');
      bar.style.width = Math.round((s.remaining / total) * 100) + '%';
      if (s.remaining <= 0) {
        clearInterval(s.interval);
        Object.assign(s, { interval: null, running: false, done: true });
        card.classList.remove('running'); card.classList.add('done');
        disp.textContent = '0:00';
        stat.textContent = 'Frigiv ✓';
        btn.textContent = 'Nulstil'; btn.className = 'wt-btn start';
        bar.style.transition = 'none'; bar.style.width = '0%';
        if (navigator.vibrate) navigator.vibrate([200,100,200]);
      }
    }, 1000);
  }

  function wtResetAll() {
    ['2-1','2-2','3-1','3-2'].forEach(id => {
      const s = wtTimers[id];
      if (s) { clearInterval(s.interval); s.interval=null; s.running=false; s.done=false; }
      const total = id.startsWith('2') ? 120 : 180;
      wtTimers[id] = { interval: null, remaining: total, total, running: false, done: false };
      const mins = total/60;
      document.getElementById('wt-card-'+id).className = 'wt-card';
      document.getElementById('wt-display-'+id).textContent = mins+':00';
      document.getElementById('wt-status-'+id).textContent = 'Klar';
      document.getElementById('wt-btn-'+id).textContent = 'Start';
      document.getElementById('wt-btn-'+id).className = 'wt-btn start';
      const bar = document.getElementById('wt-bar-'+id);
      bar.style.transition = 'none'; bar.style.width = '0%';
    });
  }

  /* ── UTC clock ── */
  function updateClock() {
    const now = new Date();
    const el = document.getElementById('utc-clock');
    if (el) el.textContent = String(now.getUTCHours()).padStart(2,'0')+':'+String(now.getUTCMinutes()).padStart(2,'0')+':'+String(now.getUTCSeconds()).padStart(2,'0')+'Z';
  }
  setInterval(updateClock, 1000);

  document.addEventListener('keydown', e => {
    if (!document.getElementById('page-eta').classList.contains('active')) return;
    if (e.key>='0'&&e.key<='9') numPress(e.key);
    else if (e.key==='Backspace') numDel();
    else if (e.key==='Tab') { e.preventDefault(); switchField(activeField==='dep'?'dur':'dep'); }
  });

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(console.error);
</script>
</body>
</html>
